---
# RBAC for the GitHub Actions runner so the Deploy workflow's
# publish-secrets job can `kubectl apply` the openclaw-secrets Secret
# directly into this namespace. Scoped as narrowly as possible: only
# the one named Secret, only this namespace, only get/create/update/patch
# (no list, no delete, no broader read).
#
# Why a separate file (and not inlined in 020-deployment.yaml): the
# runner pod's ServiceAccount lives in the `arc-runners` namespace, but
# the Role+Binding live here in `claw-code-local` (Role authority is
# always namespace-local — the RoleBinding just references a subject
# from elsewhere).
#
# The SA name `…-gha-rs-no-permission` is the default ARC convention:
# scale-set runners ship with a SA that has zero cluster permissions
# by design, so each workload that wants to give them access has to
# grant it explicitly (which is what we're doing here).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: arc-runner-secrets-writer
  namespace: claw-code-local
rules:
  # `resourceNames` does not constrain `create` — names are decided
  # at request time, so K8s RBAC can't scope create-by-name. Split
  # into two rules: a broad `create` (any secret in this namespace
  # could be created — low risk since the runner would never be
  # able to read/modify it afterwards), and a name-scoped
  # `get/update/patch` for the one Secret the workflow actually
  # touches on subsequent runs.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["openclaw-secrets"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: arc-runner-secrets-writer
  namespace: claw-code-local
subjects:
  - kind: ServiceAccount
    name: arc-runner-scale-claw-code-local-gha-rs-no-permission
    namespace: arc-runners
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: arc-runner-secrets-writer
