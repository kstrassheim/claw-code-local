---
# Persistent workspace for the openclaw container.
# Backed by a StorageClass managed by the local K8s installation.
# The mount lives at /home/node/.openclaw/workspace inside the container.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-workspace
  namespace: openclaw
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: default
  resources:
    requests:
      # 50Gi — roomy without being wasteful for a coding workspace
      # (git clones, npm/pip caches, Chromium state, podman storage,
      # openclaw conversation state).
      storage: 50Gi
