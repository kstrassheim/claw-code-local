---
# Persistent workspace for the openclaw container, mounted at
# /home/node/.openclaw/workspace inside the container.
#
# Uses the cluster default StorageClass (`local-path`, k3s-bundled
# rancher.io/local-path-provisioner). The provisioner creates a
# per-PVC directory on whichever node the consuming pod is scheduled
# on — combined with the deployment's nodeSelector pinning to datapi,
# this means the workspace always lives on datapi's local disk under
# /opt/local-path-provisioner/.
#
# Reclaim policy on `local-path` is Delete: if this PVC is ever
# deleted (e.g. by removing the claw-code-local ArgoCD Application with
# prune: true), the workspace dir on datapi is wiped. Day-to-day
# GitOps doesn't touch PVCs, so this is fine in normal operation —
# just don't manually `kubectl delete pvc openclaw-workspace`.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-workspace
  namespace: openclaw
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      # 50Gi — roomy without being wasteful for a coding workspace
      # (git clones, npm/pip caches, Chromium state, podman storage,
      # openclaw conversation state).
      storage: 50Gi
