---
# Persistent workspace for the openclaw container, mounted at
# /home/node/.openclaw/workspace inside the container.
#
# Uses the `local-path-data` StorageClass deployed by k8s-data-management
# (sister provisioner restricted to datapi, base path /data/pv). Volumes
# land at /data/pv/<pvc-name>/ via a custom setup script that symlinks
# the auto-generated provisioner dirname to a clean alias. For this
# PVC the on-disk path is /data/pv/openclaw-workspace/ on datapi.
#
# Reclaim policy on local-path-data is Retain — deleting this PVC
# leaves the workspace dir intact on datapi so the next deploy can
# pick up state. Cleanup is manual when intended.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-workspace
  namespace: claw-code-local
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path-data
  resources:
    requests:
      # 50Gi — roomy without being wasteful for a coding workspace
      # (git clones, npm/pip caches, Chromium state, podman storage,
      # openclaw conversation state).
      storage: 50Gi
