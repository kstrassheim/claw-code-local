---
# Namespace only. The `openclaw-tools-md` ConfigMap that mounts at
# ~/.openclaw/workspace/TOOLS.md is **not** declared here — it's
# generated at deploy time by the "Build and apply openclaw-tools-md
# ConfigMap from k8s/tools/" step in the ArgoCD sync, which concatenates
# the per-tool TOOLS-*.md files under k8s/tools/ into a single TOOLS.md
# key via `kubectl create configmap --from-file ... --dry-run=client -o yaml | kubectl apply -f -`.
#
# Why generate it instead of inlining: the assembled TOOLS.md is
# ~2k lines of markdown describing every capability wired into the
# bot. Pasting it into a YAML literal would make this manifest
# unreadable and any per-section edit would scroll through the whole
# blob. Splitting into k8s/tools/ keeps each capability description
# in its own file (mirroring the upstream openclaw chart's layout).
apiVersion: v1
kind: Namespace
metadata:
  name: openclaw
  labels:
    environment: dev
    project: claw-code-local
