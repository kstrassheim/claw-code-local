---
# SKILL.md for the issue-watcher chat skill, mounted at
# ~/.openclaw/workspace/skills/issue-watcher/SKILL.md via subPath in
# the Deployment. Lets the user toggle / inspect the watcher from
# chat (e.g. "watcher stop") without an image rebuild.
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-skill-issue-watcher
  namespace: claw-code-local
data:
  SKILL.md: |
    ---
    name: issue-watcher
    description: Toggle and inspect the autonomous issue-fixer that runs as a subprocess inside this pod.
    user-invocable: true
    ---

    # issue-watcher — control the autonomous issue fixer

    A CronJob `issue-watcher` (namespace `claw-code-local`) ticks every
    5 minutes. On each tick it lists open GitHub issues assigned to
    this bot account, then **spawns an `openclaw agent --local`
    subprocess inside this very pod**, one per (repo, issue), against
    a long-lived git checkout under `~/.openclaw/projects/<repo>/`.

    **Concurrency is per repo, capped at 1.** The fixer holds a
    `mkdir`-based lock at `~/.openclaw/projects/<repo>/.fixer.lock`;
    queued issues for a busy repo wait for the next tick. Each fixer
    is bounded to ~1 hour wall-clock by the agent's `--timeout`.

    Use this skill when the user says any of:

    | User says | Run |
    |---|---|
    | `watcher status`, `is the watcher on?`, `what's the issue watcher doing?` | the status command |
    | `watcher start`, `enable the watcher`, `turn on the issue fixer` | the start command |
    | `watcher stop`, `pause the watcher`, `disable issue fixing` | the stop command |
    | `watcher list`, `what issues are being fixed?`, `active fixers` | the list command |
    | `watcher logs <repo>#<issue>` | tail the fixer log for that pair |

    ## Commands (run via your `exec` tool — kubectl is in PATH)

    ### status

    ```
    kubectl -n claw-code-local get cronjob issue-watcher \
      -o jsonpath='suspended={.spec.suspend}{"\n"}schedule={.spec.schedule}{"\n"}lastSchedule={.status.lastScheduleTime}{"\n"}lastSuccess={.status.lastSuccessfulTime}{"\n"}'
    ```

    Report `suspended=true` as **stopped**, `false` as **running**.
    Include `lastSchedule` so the user sees when it last fired.

    ### start

    ```
    kubectl -n claw-code-local patch cronjob issue-watcher \
      -p '{"spec":{"suspend":false}}'
    ```

    Then run the status command and report the new state.

    ### stop

    Two operations: suspend the CronJob AND kill every in-flight
    fixer subprocess inside this pod immediately. The user's intent
    on "stop" is "stop coding work right now", not "block new ticks".

    ```
    kubectl -n claw-code-local patch cronjob issue-watcher \
      -p '{"spec":{"suspend":true}}'
    pkill -f 'openclaw agent --local' || true
    rm -rf $HOME/.openclaw/.fixer-locks/* 2>/dev/null
    ```

    Run all three. Then run the status command. Report:
      - the new suspended state, and
      - how many fixer subprocesses were terminated (pkill returns
        non-zero when nothing matched — that's fine).

    Partial work in those subprocesses is discarded — there is no
    clean shutdown handshake.

    ### list

    ```
    ls -1 $HOME/.openclaw/.fixer-locks/ 2>/dev/null | sed 's|__|/|'
    ```

    Each line is an `<owner>/<name>` repo with an in-flight fixer.
    Empty output = nothing is being fixed right now.

    For details on what each fixer is doing, also run:

    ```
    pgrep -af 'openclaw agent --local'
    ```

    The `--session-id` argument encodes `issue-<owner>-<name>-<n>` so
    you can map subprocesses back to issues.

    ### logs

    For `watcher logs <repo>#<issue>` (e.g. `watcher logs owner/repo#53`):

    ```
    tail -n 80 $HOME/.openclaw/fixer-logs/<owner>_<name>-<n>.log
    ```

    (The slash in the repo name becomes an underscore in the log
    filename. `<n>` is the issue number.)

    ### kill (alias for the second half of `stop`)

    When the user wants to terminate in-flight fixers but keep the
    CronJob running:

    ```
    pkill -f 'openclaw agent --local' || true
    rm -rf $HOME/.openclaw/.fixer-locks/* 2>/dev/null
    ```

    ## Reporting style

    Keep replies terse. One line per piece of state. Example status
    reply:

    > Watcher: **running** · schedule `*/5 * * * *` · last fired
    > 2026-05-18T10:25:00Z · 1 fixer active (claw-code#52).

    Do not paste raw kubectl / pgrep output unless the user asks.
---
# Issue-watcher CronJob — polls GitHub for issues assigned to the bot
# every 5 minutes and `kubectl exec`s into the openclaw pod, spawning
# an `openclaw agent --local` subprocess there per (repo, issue).
#
# Architecture, top-down:
#   - This CronJob runs `cron-issue-spawn` (baked into the image).
#   - cron-issue-spawn calls `heartbeat-issue-tick` (also baked in),
#     which queries the GitHub API and lists `.fixer.lock` dirs
#     under ~/.openclaw/projects/ in the openclaw pod (via `kubectl
#     exec`). The lock list is the concurrency ledger: max 1 fixer
#     per repo, because checkouts can't be shared.
#   - For each (repo, issue) that's not locked, the spawner runs
#     `kubectl exec <openclaw-pod> -- nohup fixer-runner ...&`.
#   - `fixer-runner` (also baked in) acquires the per-repo lock,
#     git-clones-or-updates ~/.openclaw/projects/<repo>/, branches,
#     runs the embedded agent in --local mode, and releases the lock
#     on every exit path via a bash trap.
#
# Why a single shared checkout per repo: the agent learns from prior
# state on the same repo across runs (history in .git, cached
# `node_modules`, etc.). Two concurrent fixers on the same repo
# would race the working tree, so we hold a per-repo lock.
#
# Toggle from chat: see the issue-watcher SKILL.md above.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: issue-watcher
  namespace: claw-code-local
---
# RBAC for the watcher CronJob's SA. Scoped to claw-code-local; only
# pod/exec into the openclaw deployment's pods (the planner and the
# spawner both `kubectl exec` there).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: issue-watcher
  namespace: claw-code-local
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: issue-watcher
  namespace: claw-code-local
subjects:
  - kind: ServiceAccount
    name: issue-watcher
    namespace: claw-code-local
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: issue-watcher
---
# Permissions for the openclaw bot's chat-skill (`watcher
# status/start/stop/list/kill`). It only needs CronJob get/patch;
# the actual subprocess kill happens locally inside the pod via
# pkill, not via the K8s API.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: issue-watcher-control
  namespace: claw-code-local
rules:
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    resourceNames: ["issue-watcher"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: issue-watcher-control
  namespace: claw-code-local
subjects:
  - kind: ServiceAccount
    name: openclaw
    namespace: claw-code-local
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: issue-watcher-control
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: issue-watcher
  namespace: claw-code-local
  labels:
    app: issue-watcher
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 120
  # spec.suspend deliberately omitted — K8s defaults to false, runs
  # on initial deploy. With ArgoCD's ServerSideApply, the absent
  # field is unmanaged, so chat-driven `watcher stop` (which patches
  # suspend=true at runtime) sticks across reconciles.
  jobTemplate:
    metadata:
      labels:
        app: issue-watcher
    spec:
      backoffLimit: 0
      ttlSecondsAfterFinished: 300
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels:
            app: issue-watcher
        spec:
          serviceAccountName: issue-watcher
          restartPolicy: Never
          imagePullSecrets:
            - name: registry-pull-secret
          containers:
            - name: watcher
              image: claw-code-local  # transformed by kustomize images: pin
              imagePullPolicy: IfNotPresent
              command: ["/usr/local/bin/cron-issue-spawn"]
              envFrom:
                # GITHUB_TOKEN is the only secret the watcher itself
                # uses (for the GitHub API calls). Model API keys are
                # already in the openclaw pod's env, inherited by the
                # spawned fixer subprocesses.
                - secretRef:
                    name: openclaw-secrets
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
