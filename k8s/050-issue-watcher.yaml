---
# SKILL.md for the issue-watcher chat skill, mounted at
# ~/.openclaw/plugin-skills/issue-watcher/SKILL.md via subPath in the
# Deployment. Lets the user toggle / inspect the CronJob from chat
# (e.g. "watcher stop") without an image rebuild — change the data
# block here, push, ArgoCD applies the new ConfigMap, kubectl rollout
# restart picks it up (subPath mounts don't reload live).
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-skill-issue-watcher
  namespace: claw-code-local
data:
  SKILL.md: |
    ---
    name: issue-watcher
    description: Toggle and inspect the K8s CronJob that auto-spawns GitHub issue-fixer agents for issues assigned to the bot.
    user-invocable: true
    ---

    # issue-watcher — control the autonomous issue fixer

    The cluster runs a CronJob `issue-watcher` (namespace
    `claw-code-local`) every 5 minutes. Each tick lists open GitHub
    issues assigned to this bot account, then spawns a K8s Job per
    issue that runs `openclaw agent --local` to clone, code, push, and
    open a PR. At most 2 fixer Jobs run per repo at a time; each is
    bounded to 1 hour by `activeDeadlineSeconds`.

    Use this skill when the user says any of:

    | User says | Run |
    |---|---|
    | `watcher status`, `is the watcher on?`, `what's the issue watcher doing?` | the status command below |
    | `watcher start`, `enable the watcher`, `turn on the issue fixer` | the start command |
    | `watcher stop`, `pause the watcher`, `disable issue fixing` | the stop command |
    | `watcher list`, `what issues are being fixed?`, `active fixer jobs` | the list command |

    ## Commands (run via your `exec` tool — kubectl is in PATH)

    ### status

    ```
    kubectl -n claw-code-local get cronjob issue-watcher \
      -o jsonpath='suspended={.spec.suspend}{"\n"}schedule={.spec.schedule}{"\n"}lastSchedule={.status.lastScheduleTime}{"\n"}lastSuccess={.status.lastSuccessfulTime}{"\n"}'
    ```

    Report `suspended=true` as **stopped**, `false` as **running**.
    Include `lastSchedule` so the user sees when it last fired.

    ### start

    ```
    kubectl -n claw-code-local patch cronjob issue-watcher \
      -p '{"spec":{"suspend":false}}'
    ```

    Then run the status command and report the new state.

    ### stop

    Two operations: suspend the CronJob AND delete every in-flight
    fixer Job immediately (the user expects `stop` to actually stop
    coding work, not just block new ticks).

    ```
    kubectl -n claw-code-local patch cronjob issue-watcher \
      -p '{"spec":{"suspend":true}}'
    kubectl -n claw-code-local delete jobs -l app=issue-fixer
    ```

    Run both. Then run the status command. Report:
      - the new suspended state, and
      - how many fixer Jobs were terminated (the second command
        prints one `job.batch "<name>" deleted` line per Job).

    Partial work in those Jobs is discarded — there is no clean
    shutdown handshake. That is the user's stated intent.

    ### list

    ```
    kubectl -n claw-code-local get jobs -l app=issue-fixer \
      -o custom-columns=NAME:.metadata.name,STATUS:.status.conditions[*].type,AGE:.metadata.creationTimestamp,ISSUE:.metadata.labels.issueNumber,REPO:.metadata.labels.issueRepo
    ```

    Each row is a fixer Job. The labels `issueRepo` (slug) and
    `issueNumber` identify what it's working on. Empty result means
    nothing is being fixed right now.

    ### kill (alias for the second half of `stop`)

    When the user wants to terminate in-flight fixers but keep the
    CronJob running (so the next tick can pick the issues up again):

    ```
    kubectl -n claw-code-local delete jobs -l app=issue-fixer
    ```

    ## Reporting style

    Keep replies terse. One line per piece of state. Example status
    reply:

    > Watcher: **running** · schedule `*/5 * * * *` · last fired
    > 2026-05-18T10:25:00Z · 1 fixer Job active (claw-code#52).

    Do not paste raw kubectl JSON output to chat unless the user asks.
---
# Issue-watcher CronJob — polls GitHub for issues assigned to the bot
# every 5 minutes and `kubectl create job`s an `openclaw agent --local`
# Job per (repo, issue), bounded to 2 concurrent Jobs per repo.
#
# Architecture, top-down:
#   - This CronJob runs `cron-issue-spawn` (baked into the image).
#   - cron-issue-spawn calls `heartbeat-issue-tick` (also baked in),
#     which queries the GitHub API + the K8s Jobs API (via the SA
#     mounted below) and emits a JSON spawn-plan.
#   - For each toSpawn entry, the spawner POSTs a Job manifest. Each
#     spawned Job runs `openclaw agent --local --message "Fix issue
#     <url>"` with envFrom: openclaw-secrets and an emptyDir workspace.
#   - The agent in each Job clones the target repo, branches, codes,
#     commits, pushes, opens a PR back to the source, and exits.
#   - Concurrency is enforced by labeling Jobs `app=issue-fixer,
#     issueRepo=<slug>` and counting them on each tick. K8s itself is
#     the ledger — no /tmp lock files or shared volumes needed.
#
# Toggle from chat: `kubectl -n claw-code-local patch cronjob
# issue-watcher -p '{"spec":{"suspend":true}}'` (RBAC granted in the
# Role below; the bot can run this via its existing kubectl access).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: issue-watcher
  namespace: claw-code-local
---
# Scoped only to claw-code-local. No cluster-wide access; only the
# Jobs API in this single namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: issue-watcher
  namespace: claw-code-local
rules:
  # Read: heartbeat-issue-tick counts in-flight fixer Jobs per repo.
  # Create: cron-issue-spawn creates new fixer Jobs.
  # Delete: not granted — Jobs self-clean via ttlSecondsAfterFinished;
  # operators can clean up manually if needed.
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create"]
  # Spawned Jobs run pods. The fixer Pod also needs to read its own
  # spec for the agent's debugging output; if you want to suppress that
  # later, you can drop `pods` from this Role with no functional impact.
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: issue-watcher
  namespace: claw-code-local
subjects:
  - kind: ServiceAccount
    name: issue-watcher
    namespace: claw-code-local
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: issue-watcher
---
# Permissions for the openclaw bot's chat-skill commands
# (watcher start/stop/status/list/kill). Strictly narrower than the
# fixer SA — only the watcher CronJob itself and fixer Jobs, never any
# other workload in the namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: issue-watcher-control
  namespace: claw-code-local
rules:
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    resourceNames: ["issue-watcher"]
    verbs: ["get", "patch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: issue-watcher-control
  namespace: claw-code-local
subjects:
  - kind: ServiceAccount
    name: openclaw
    namespace: claw-code-local
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: issue-watcher-control
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: issue-watcher
  namespace: claw-code-local
  labels:
    app: issue-watcher
spec:
  schedule: "*/5 * * * *"
  # Forbid: a tick takes seconds; never overlap. Skip if the previous
  # one is still running (shouldn't happen, but it caps the blast radius
  # if it ever does).
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 120
  # `spec.suspend` deliberately omitted: K8s defaults it to false, so
  # the watcher runs on initial deploy. With ArgoCD's ServerSideApply
  # syncPolicy, an absent field is unmanaged — runtime `kubectl patch`
  # toggles (from the issue-watcher chat skill) stick across syncs.
  # If we set `suspend: false` here, ArgoCD's selfHeal would revert
  # any chat-driven `watcher stop` back to running.
  jobTemplate:
    metadata:
      labels:
        app: issue-watcher
    spec:
      backoffLimit: 0
      ttlSecondsAfterFinished: 300
      # 60s was too tight — image pull on a cold node + GitHub pagination
      # + K8s API calls easily exceed it. 300s leaves headroom for slow
      # paths but still kills a wedged tick before the next cron fire.
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels:
            app: issue-watcher
        spec:
          serviceAccountName: issue-watcher
          restartPolicy: Never
          imagePullSecrets:
            - name: registry-pull-secret
          containers:
            - name: watcher
              image: claw-code-local  # transformed by kustomize images: pin
              imagePullPolicy: IfNotPresent
              command: ["/usr/local/bin/cron-issue-spawn"]
              env:
                # cron-issue-spawn reads $POD_NAME to look up its own
                # container image at runtime — the spawned fixer Job
                # uses the same tag, so the agent runtime being tested
                # by the watcher IS the one that fixes issues. The
                # downward API can't return a `containers[].image`
                # JSONPath result directly, hence the indirection.
                - name: POD_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.name
                # 1h budget per fixer Job. cron-issue-spawn translates
                # this to both the agent's --timeout flag and the
                # Job's activeDeadlineSeconds.
                - name: JOB_AGENT_TIMEOUT_SECONDS
                  value: "3600"
              envFrom:
                # GITHUB_TOKEN is the only secret the watcher itself
                # needs (for the GitHub API calls). It does NOT need
                # the model API keys — those are injected separately
                # into each spawned fixer Job.
                - secretRef:
                    name: openclaw-secrets
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
