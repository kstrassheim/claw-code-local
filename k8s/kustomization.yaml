---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: claw-code-local
resources:
  - 000-namespace-and-config.yaml
  - 005-pvc.yaml
  - 010-openclaw-config.yaml
  - 020-deployment.yaml
  - 030-service.yaml
  - 040-networkpolicy.yaml
  - 050-issue-watcher.yaml
  - 060-runner-rbac.yaml
  # openclaw-secrets is no longer in git. The Deploy workflow's
  # publish-secrets job `kubectl apply`s it directly each run via
  # the RBAC in 060-runner-rbac.yaml. Argo CD doesn't manage that
  # Secret. If you ever need a "clean slate" bootstrap from git,
  # re-run the Deploy workflow (or workflow_dispatch the
  # apply-secrets job).
# Pin the openclaw image here so the deployment manifest stays static and
# Argo CD picks up new builds when this tag is bumped. Tag tracks
# OPENCLAW_VERSION in /VERSIONS — the deploy workflow rewrites this entry
# after a successful image push.
images:
  - name: claw-code-local
    newName: mainpi.local:30500/openclaw/claw-code-local
    newTag: v2026.5.12.35
