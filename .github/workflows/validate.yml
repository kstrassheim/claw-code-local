name: Validate (Pull Request)

on:
  pull_request:
    branches: [main]

jobs:
  verify-build:
    name: Verify Image Build
    runs-on: arc-runner-scale-claw-code-local
    env:
      IMAGE_NAME: ${{ vars.OPENCLAW_REGISTRY_URL }}/openclaw/claw-code-local
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to local registry
        if: vars.OPENCLAW_REGISTRY_URL != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.OPENCLAW_REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Read VERSIONS file
        run: |
          . ./VERSIONS
          echo "OPENCLAW_UPSTREAM=${OPENCLAW_UPSTREAM}" >> "$GITHUB_ENV"

      - name: Ensure openclaw-base is mirrored from GHCR into local registry
        # Same logic as deploy.yml — see comment there. Validate runs on
        # PRs and just needs the base image available so the Dockerfile
        # FROM resolves; no separate build step is needed beyond that.
        run: |
          SRC_TAG="${OPENCLAW_UPSTREAM#v}"
          SOURCE_IMAGE="ghcr.io/openclaw/openclaw:${SRC_TAG}"
          TARGET_IMAGE="${{ env.IMAGE_NAME }}/openclaw-base:${OPENCLAW_UPSTREAM}"
          if docker manifest inspect "$TARGET_IMAGE" >/dev/null 2>&1; then
            echo "$TARGET_IMAGE already present — skipping import"
          else
            docker pull "$SOURCE_IMAGE"
            docker tag  "$SOURCE_IMAGE" "$TARGET_IMAGE"
            docker push "$TARGET_IMAGE"
          fi
          echo "BASE_IMAGE=${TARGET_IMAGE}" >> "$GITHUB_ENV"

      - name: Build Docker image (no push, test only)
        uses: docker/build-push-action@v6
        with:
          context: ./builder
          platforms: linux/arm64
          push: false
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}:pr-${{ github.event.pull_request.number }}
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}
            GH_CLI_VERSION=2.92.0
            GITHUB_MCP_SERVER_VERSION=1.0.3
            TERRAFORM_VERSION=1.13.0
            TERRAFORM_MCP_VERSION=0.5.2
            CODE_SERVER_VERSION=4.118.0
            AWS_CLI_VERSION=2.34.45
            GCLOUD_VERSION=567.0.0
            ALIYUN_CLI_VERSION=3.3.14
          cache-from: type=gha
          cache-to: type=gha,mode=max