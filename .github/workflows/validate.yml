name: Validate (Pull Request)

on:
  pull_request:
    branches: [main]

jobs:
  check-llm-secrets:
    name: At least one LLM API key configured
    runs-on: ubuntu-latest
    steps:
      - id: check
        run: |
          if [[ -n "$MISTRAL_API_KEY" ]] || [[ -n "$MINIMAX_API_KEY" ]]; then
            echo "At least one LLM API key is configured"
            exit 0
          else
            echo "ERROR: Neither MISTRAL_API_KEY nor MINIMAX_API_KEY is set."
            echo "This validation run will fail until at least one LLM API key is added to the repository secrets."
            exit 1
          fi
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}

  docker-build:
    name: Docker Build (no push)
    runs-on: ubuntu-latest
    needs: check-llm-secrets
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to local registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.OPENCLAW_REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Read VERSIONS file
        run: |
          if [ -f VERSIONS ]; then
            echo "OPENCLAW_UPSTREAM=$(grep -E '^OPENCLAW_UPSTREAM=' VERSIONS | cut -d= -f2)" >> $GITHUB_ENV
            echo "GH_CLI_VERSION=$(grep -E '^GH_CLI_VERSION=' VERSIONS | cut -d= -f2)" >> $GITHUB_ENV
            echo "GITHUB_MCP_SERVER_VERSION=$(grep -E '^GITHUB_MCP_SERVER_VERSION=' VERSIONS | cut -d= -f2)" >> $GITHUB_ENV
            echo "TERRAFORM_VERSION=$(grep -E '^TERRAFORM_VERSION=' VERSIONS | cut -d= -f2)" >> $GITHUB_ENV
            echo "TERRAFORM_MCP_VERSION=$(grep -E '^TERRAFORM_MCP_VERSION=' VERSIONS | cut -d= -f2)" >> $GITHUB_ENV
            echo "CODE_SERVER_VERSION=$(grep -E '^CODE_SERVER_VERSION=' VERSIONS | cut -d= -f2)" >> $GITHUB_ENV
            echo "AWS_CLI_VERSION=$(grep -E '^AWS_CLI_VERSION=' VERSIONS | cut -d= -f2)" >> $GITHUB_ENV
            echo "GCLOUD_VERSION=$(grep -E '^GCLOUD_VERSION=' VERSIONS | cut -d= -f2)" >> $GITHUB_ENV
            echo "ALIYUN_CLI_VERSION=$(grep -E '^ALIYUN_CLI_VERSION=' VERSIONS | cut -d= -f2)" >> $GITHUB_ENV
          else
            echo "VERSIONS file not found — using defaults"
          fi

      - name: Build Docker image (no push, test only)
        uses: docker/build-push-action@v6
        with:
          context: ./builder
          platforms: linux/arm64
          push: false
          load: true
          tags: |
            ${{ vars.OPENCLAW_REGISTRY_URL }}/openclaw/claw-code-local:pr-${{ github.event.pull_request.number }}
          build-args: |
            OPENCLAW_UPSTREAM=${{ env.OPENCLAW_UPSTREAM || 'kstrassheim/openclaw' }}
            GH_CLI_VERSION=${{ env.GH_CLI_VERSION || '2.92.0' }}
            GITHUB_MCP_SERVER_VERSION=${{ env.GITHUB_MCP_SERVER_VERSION || '1.0.3' }}
            TERRAFORM_VERSION=${{ env.TERRAFORM_VERSION || '1.13.0' }}
            TERRAFORM_MCP_VERSION=${{ env.TERRAFORM_MCP_VERSION || '0.5.2' }}
            CODE_SERVER_VERSION=${{ env.CODE_SERVER_VERSION || '4.118.0' }}
            AWS_CLI_VERSION=${{ env.AWS_CLI_VERSION || '2.34.45' }}
            GCLOUD_VERSION=${{ env.GCLOUD_VERSION || '567.0.0' }}
            ALIYUN_CLI_VERSION=${{ env.ALIYUN_CLI_VERSION || '3.3.14' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max