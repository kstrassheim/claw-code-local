name: Validate (Pull Request)

on:
  pull_request:
    branches:
      - main

jobs:
  verify-build:
    name: Verify Image Build
    runs-on: arc-runner-scale-claw-code-local
    env:
      OPENCLAW_REPO: https://github.com/openclaw/openclaw.git
      REGISTRY: ${{ vars.OPENCLAW_REGISTRY_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Read VERSIONS
        run: |
          . ./VERSIONS
          echo "UPSTREAM_REF=${OPENCLAW_UPSTREAM}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${OPENCLAW_VERSION}" >> "$GITHUB_ENV"
          echo "GH_CLI_VERSION=${GH_CLI_VERSION}" >> "$GITHUB_ENV"
          echo "GITHUB_MCP_SERVER_VERSION=${GITHUB_MCP_SERVER_VERSION}" >> "$GITHUB_ENV"
          echo "GLAB_VERSION=${GLAB_VERSION}" >> "$GITHUB_ENV"
          echo "GITLAB_MCP_VERSION=${GITLAB_MCP_VERSION}" >> "$GITHUB_ENV"
          echo "TERRAFORM_VERSION=${TERRAFORM_VERSION}" >> "$GITHUB_ENV"
          echo "TERRAFORM_MCP_VERSION=${TERRAFORM_MCP_VERSION}" >> "$GITHUB_ENV"
          echo "CODE_SERVER_VERSION=${CODE_SERVER_VERSION}" >> "$GITHUB_ENV"
          echo "AWS_CLI_VERSION=${AWS_CLI_VERSION}" >> "$GITHUB_ENV"
          echo "GCLOUD_VERSION=${GCLOUD_VERSION}" >> "$GITHUB_ENV"
          echo "ALIYUN_CLI_VERSION=${ALIYUN_CLI_VERSION}" >> "$GITHUB_ENV"

      - name: Require OPENCLAW_REGISTRY_URL
        run: |
          if [[ -z "$REGISTRY" ]]; then
            echo "::error::OPENCLAW_REGISTRY_URL is not set. Cannot proceed."
            exit 1
          fi
          echo "Using registry: ${REGISTRY}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            opt=registry.mirror.mainpi.local:30500=insecure
          env:
            DOCKER_TLS_VERIFY: "0"

      - name: Log in to local registry
        # REGISTRY_USERNAME / REGISTRY_PASSWORD come from the runner pod's
        # envFrom registry-creds (shared/runner-values.yaml in k8s-deployment),
        # not from GitHub repo secrets — the runner is already authorized.
        run: |
          test -n "${REGISTRY_USERNAME:-}" || { echo "::error::REGISTRY_USERNAME missing in runner env (registry-creds Secret)"; exit 1; }
          test -n "${REGISTRY_PASSWORD:-}" || { echo "::error::REGISTRY_PASSWORD missing in runner env (registry-creds Secret)"; exit 1; }
          echo "${REGISTRY_PASSWORD}" | docker login "${{ vars.OPENCLAW_REGISTRY_URL }}" --username "${REGISTRY_USERNAME}" --password-stdin

      - name: Clone Upstream OpenClaw
        run: |
          git clone --depth 1 "${OPENCLAW_REPO}" _openclaw_src
          cd _openclaw_src
          git fetch --tags --force
          git -c advice.detachedHead=false checkout "${UPSTREAM_REF}"

      - name: Ensure openclaw-base is mirrored from GHCR into local registry
        # Multi-arch mirror via buildx imagetools so the registry retains
        # the full manifest list (arm64 + amd64) instead of the runner's
        # single arch. ghcr.io/openclaw/openclaw is a public package so
        # no login needed. Skip the import when the tag already exists.
        run: |
          SRC_TAG="${UPSTREAM_REF#v}"
          SRC="ghcr.io/openclaw/openclaw:${SRC_TAG}"
          DST="${REGISTRY}/openclaw/openclaw-base:${UPSTREAM_REF}"
          if docker manifest inspect "${DST}" >/dev/null 2>&1; then
            echo ">> ${DST} already mirrored, skipping"
          else
            docker buildx imagetools create --tag "${DST}" "${SRC}"
          fi

      - name: Build Upstream Image (no push, test only)
        run: |
          docker build \
            -t "openclaw-base:${UPSTREAM_REF}" \
            _openclaw_src

      - name: Extend Image with Python Packages (no push, test only)
        run: |
          docker build \
            --build-arg "BASE_IMAGE=${REGISTRY}/openclaw/openclaw-base:${UPSTREAM_REF}" \
            --build-arg "EPHE_FETCH_NONCE=${IMAGE_TAG}" \
            --build-arg "GH_CLI_VERSION=${GH_CLI_VERSION}" \
            --build-arg "GITHUB_MCP_SERVER_VERSION=${GITHUB_MCP_SERVER_VERSION}" \
            --build-arg "GLAB_VERSION=${GLAB_VERSION}" \
            --build-arg "GITLAB_MCP_VERSION=${GITLAB_MCP_VERSION}" \
            --build-arg "TERRAFORM_VERSION=${TERRAFORM_VERSION}" \
            --build-arg "TERRAFORM_MCP_VERSION=${TERRAFORM_MCP_VERSION}" \
            --build-arg "CODE_SERVER_VERSION=${CODE_SERVER_VERSION}" \
            --build-arg "AWS_CLI_VERSION=${AWS_CLI_VERSION}" \
            --build-arg "GCLOUD_VERSION=${GCLOUD_VERSION}" \
            --build-arg "ALIYUN_CLI_VERSION=${ALIYUN_CLI_VERSION}" \
            -t "${REGISTRY}/openclaw/claw-code-local:pr-${{ github.event.pull_request.number }}" \
            builder/