name: Seal and Apply Secrets

# Seals GitHub repository secrets into k8s/openclaw-secrets-sealed.yaml
# (gitops; ArgoCD picks it up). Modeled on the k8s-openclaw
# publish-secrets job: runs on the in-cluster ARC runner, so we have
# pod-network reach to the sealed-secrets controller and no kubeconfig
# secret is needed.
#
# Trigger is workflow_dispatch only — dispatch it from the branch you
# want the sealed file committed to (main is protected, so the push
# step targets the triggering branch via github.ref_name and the result
# rides along with that branch's PR into main).

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  seal:
    name: Seal GH Secrets → commit SealedSecret to repo
    runs-on: arc-runner-scale-claw-code-local
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Use the bot PAT so the subsequent git push is authenticated
          # as the bot account (which should be on branch-protection's
          # bypass list for the target branch). The default GITHUB_TOKEN
          # would push as github-actions[bot], which typically lacks
          # those rights.
          token: ${{ secrets.BOT_GITHUB_TOKEN }}

      - name: Install kubectl and kubeseal
        run: |
          ARCH=$(dpkg --print-architecture)
          mkdir -p "$HOME/.local/bin"

          KUBECTL_VERSION="$(curl -sL https://dl.k8s.io/release/stable.txt)"
          curl -sLo "$HOME/.local/bin/kubectl" \
            "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/${ARCH}/kubectl"
          chmod +x "$HOME/.local/bin/kubectl"

          KUBESEAL_VERSION="0.27.3"
          curl -sLo /tmp/kubeseal.tar.gz \
            "https://github.com/bitnami-labs/sealed-secrets/releases/download/v${KUBESEAL_VERSION}/kubeseal-${KUBESEAL_VERSION}-linux-${ARCH}.tar.gz"
          tar -xzf /tmp/kubeseal.tar.gz -C "$HOME/.local/bin" kubeseal
          chmod +x "$HOME/.local/bin/kubeseal"

          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Fetch SealedSecrets certificate
        # In-cluster runner has pod-network reach to the controller's
        # Service in kube-system; /v1/cert.pem is unauthenticated by
        # design, so no kubeconfig / RBAC is needed.
        run: |
          kubeseal --fetch-cert \
            --controller-namespace kube-system \
            --controller-name sealed-secrets \
            > /tmp/ss-cert.pem
          test -s /tmp/ss-cert.pem

      - name: Seal openclaw-secrets
        # Secret set matches claw-code/.github/workflows/seal-secrets.yml
        # exactly. secrets.GITHUB_TOKEN is reserved by GitHub Actions
        # (returns the auto-generated workflow token, not the bot PAT),
        # so we read the bot PAT from BOT_GITHUB_TOKEN and seal it under
        # the k8s-side key name GITHUB_TOKEN that openclaw expects.
        env:
          MISTRAL_API_KEY:    ${{ secrets.MISTRAL_API_KEY }}
          MINIMAX_API_KEY:    ${{ secrets.MINIMAX_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN:       ${{ secrets.BOT_GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ENTRA_TENANT_ID:    ${{ secrets.ENTRA_TENANT_ID }}
          ENTRA_USERNAME:     ${{ secrets.ENTRA_USERNAME }}
          ENTRA_PASSWORD:     ${{ secrets.ENTRA_PASSWORD }}
          ENTRA_TOTP_SEED:    ${{ secrets.ENTRA_TOTP_SEED }}
        run: |
          kubectl create secret generic openclaw-secrets \
            --namespace openclaw \
            --dry-run=client \
            --from-literal=MISTRAL_API_KEY="$MISTRAL_API_KEY" \
            --from-literal=MINIMAX_API_KEY="$MINIMAX_API_KEY" \
            --from-literal=GEMINI_API_KEY="$GEMINI_API_KEY" \
            --from-literal=GITHUB_TOKEN="$GITHUB_TOKEN" \
            --from-literal=TELEGRAM_BOT_TOKEN="$TELEGRAM_BOT_TOKEN" \
            --from-literal=ENTRA_TENANT_ID="$ENTRA_TENANT_ID" \
            --from-literal=ENTRA_USERNAME="$ENTRA_USERNAME" \
            --from-literal=ENTRA_PASSWORD="$ENTRA_PASSWORD" \
            --from-literal=ENTRA_TOTP_SEED="$ENTRA_TOTP_SEED" \
            -o yaml \
          | kubeseal --cert /tmp/ss-cert.pem --format yaml \
              > k8s/openclaw-secrets-sealed.yaml

      - name: Commit & push to the triggering branch
        # main is protected, so we push the sealed file back to whichever
        # branch the workflow_dispatch was triggered against
        # (github.ref_name). The sealed file then merges to main with
        # the rest of that branch's PR.
        run: |
          set -eu
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/openclaw-secrets-sealed.yaml
          if git diff --cached --quiet; then
            echo "no sealed-secret changes vs ${GITHUB_REF_NAME}"
            exit 0
          fi
          git commit -m "chore: rotate sealed secrets"
          git push origin "HEAD:refs/heads/${GITHUB_REF_NAME}"
