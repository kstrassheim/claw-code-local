name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ${{ vars.OPENCLAW_REGISTRY_URL }}
  IMAGE_NAME: openclaw/claw-code-local

jobs:
  check-llm-secrets:
    name: At least one LLM API key configured
    runs-on: ubuntu-latest
    steps:
      - id: check
        run: |
          if [[ -n "$MISTRAL_API_KEY" ]] || [[ -n "$MINIMAX_API_KEY" ]]; then
            echo "At least one LLM API key is configured"
            exit 0
          else
            echo "ERROR: Neither MISTRAL_API_KEY nor MINIMAX_API_KEY is set."
            echo "This run will fail until at least one LLM API key is added to repository secrets."
            exit 1
          fi
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}

  publish-secrets:
    name: Publish Sealed Secrets
    runs-on: ubuntu-latest
    needs: check-llm-secrets
    outputs:
      sealed_secrets_file: ${{ steps.seal.outputs.sealed_secrets_file }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubeseal
        run: |
          KUBESEAL_VERSION=$(curl -s https://api.github.com/repos/bitnami-labs/sealed-secrets/releases/latest | jq -r '.tag_name' | sed 's/v//')
          curl -sSL "https://github.com/bitnami-labs/sealed-secrets/releases/download/v${KUBESEAL_VERSION}/kubeseal-${KUBESEAL_VERSION}-linux-amd64.tar.gz" | tar xz -C /usr/local/bin/ kubeseal

      - name: Sealing setup
        id: seal
        run: |
          echo "$KUBECONFIG_DATA" | base64 -d > kubeconfig.yml
          export KUBECONFIG=$(pwd)/kubeconfig.yml

          SEALE_SECRET_NAME=openclaw-secrets
          SEALED_SECRET_FILE=k8s/openclaw-secrets-sealed.yaml

          cat << 'EOF' > sealing-input.yaml
          apiVersion: v1
          kind: Secret
          metadata:
            name: openclaw-secrets
            namespace: openclaw
          type: Opaque
          stringData:
            MISTRAL_API_KEY: "$MISTRAL_API_KEY"
            MINIMAX_API_KEY: "$MINIMAX_API_KEY"
            GITHUB_TOKEN: "$GITHUB_TOKEN"
            ENTRA_TENANT_ID: "$ENTRA_TENANT_ID"
            ENTRA_USERNAME: "$ENTRA_USERNAME"
            ENTRA_PASSWORD: "$ENTRA_PASSWORD"
            ENTRA_TOTP_SEED: "$ENTRA_TOTP_SEED"
            GITLAB_TOKEN: "$GITLAB_TOKEN"
            GITLAB_LOCAL_TOKEN: "$GITLAB_LOCAL_TOKEN"
            GITLAB_LOCAL_URL: "$GITLAB_LOCAL_URL"
            OPENCLAW_REGISTRY_URL: "$OPENCLAW_REGISTRY_URL"
            OPENCLAW_UPSTREAM: "kstrassheim/openclaw"
            PROXY_URL: "$PROXY_URL"
            GOOGLE_APPLICATION_CREDENTIALS: "/etc/openclaw/secrets/gcp-service-account.json"
            AWS_ACCESS_KEY_ID: "$AWS_ACCESS_KEY_ID"
            AWS_SECRET_ACCESS_KEY: "$AWS_SECRET_ACCESS_KEY"
            ALIBABA_CLOUD_ACCESS_KEY_ID: "$ALIBABA_CLOUD_ACCESS_KEY_ID"
            ALIBABA_CLOUD_ACCESS_KEY_SECRET: "$ALIBABA_CLOUD_ACCESS_KEY_SECRET"
            ALIBABA_CLOUD_REGION_ID: "$ALIBABA_CLOUD_REGION_ID"
          EOF

          kubeseal --kubeconfig kubeconfig.yml --scope namespace-wide \
            --controller-namespace sealed-secrets \
            --controller-name sealed-secrets \
            -f sealing-input.yaml -w $SEALED_SECRET_FILE

          echo "sealed_secrets_file=$SEALED_SECRET_FILE" >> $GITHUB_OUTPUT
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_DATA }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENTRA_TENANT_ID: ${{ secrets.ENTRA_TENANT_ID }}
          ENTRA_USERNAME: ${{ secrets.ENTRA_USERNAME }}
          ENTRA_PASSWORD: ${{ secrets.ENTRA_PASSWORD }}
          ENTRA_TOTP_SEED: ${{ secrets.ENTRA_TOTP_SEED }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_LOCAL_TOKEN: ${{ secrets.GITLAB_LOCAL_TOKEN }}
          GITLAB_LOCAL_URL: ${{ vars.GITLAB_LOCAL_URL }}
          OPENCLAW_REGISTRY_URL: ${{ vars.OPENCLAW_REGISTRY_URL }}
          PROXY_URL: ${{ vars.PROXY_URL }}

      - name: Commit sealed secrets
        uses: EndBug/add-and-commit@v9
        with:
          add: 'k8s/openclaw-secrets-sealed.yaml'
          message: "ci: update sealed secrets"
          signoff: false

  build-and-push-image:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: [check-llm-secrets, publish-secrets]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to local registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.OPENCLAW_REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Read VERSIONS file
        run: |
          if [ -f VERSIONS ]; then
            echo "OPENCLAW_UPSTREAM=$(grep -E '^OPENCLAW_UPSTREAM=' VERSIONS | cut -d= -f2)" >> $GITHUB_ENV
            echo "GH_CLI_VERSION=$(grep -E '^GH_CLI_VERSION=' VERSIONS | cut -d= -f2)" >> $GITHUB_ENV
            echo "GITHUB_MCP_SERVER_VERSION=$(grep -E '^GITHUB_MCP_SERVER_VERSION=' VERSIONS | cut -d= -f2)" >> $GITHUB_ENV
            echo "TERRAFORM_VERSION=$(grep -E '^TERRAFORM_VERSION=' VERSIONS | cut -d= -f2)" >> $GITHUB_ENV
            echo "TERRAFORM_MCP_VERSION=$(grep -E '^TERRAFORM_MCP_VERSION=' VERSIONS | cut -d= -f2)" >> $GITHUB_ENV
            echo "CODE_SERVER_VERSION=$(grep -E '^CODE_SERVER_VERSION=' VERSIONS | cut -d= -f2)" >> $GITHUB_ENV
            echo "AWS_CLI_VERSION=$(grep -E '^AWS_CLI_VERSION=' VERSIONS | cut -d= -f2)" >> $GITHUB_ENV
            echo "GCLOUD_VERSION=$(grep -E '^GCLOUD_VERSION=' VERSIONS | cut -d= -f2)" >> $GITHUB_ENV
            echo "ALIYUN_CLI_VERSION=$(grep -E '^ALIYUN_CLI_VERSION=' VERSIONS | cut -d= -f2)" >> $GITHUB_ENV
          fi

      - name: Clone upstream openclaw
        run: |
          git clone --depth 1 https://github.com/${{ env.OPENCLAW_UPSTREAM || 'kstrassheim/openclaw' }}.git upstream-clone
          mkdir -p builder/
          cp -r upstream-clone/openclaw-builder/* builder/ || cp -r upstream-clone/builder/* builder/ || true
          cp upstream-clone/openclaw-builder/Dockerfile builder/Dockerfile 2>/dev/null || \
            cp upstream-clone/Dockerfile builder/Dockerfile 2>/dev/null || true
          rm -rf upstream-clone

      - name: Import GHCR base image into local registry
        run: |
          SOURCE_IMAGE="ghcr.io/${{ env.OPENCLAW_UPSTREAM || 'kstrassheim/openclaw' }}:v2026.5.7"
          TARGET_IMAGE="${{ env.REGISTRY }}/openclaw/openclaw-base:v2026.5.7"
          docker pull $SOURCE_IMAGE
          docker tag $SOURCE_IMAGE $TARGET_IMAGE
          docker push $TARGET_IMAGE
          echo "BASE_IMAGE=$TARGET_IMAGE" >> $GITHUB_ENV

      - name: Extract image SHA
        id: sha
        run: |
          FULL_IMAGE="${{ env.REGISTRY }}/openclaw/claw-code-local:$(git rev-parse --short HEAD)"
          echo "FULL_IMAGE=$FULL_IMAGE" >> $GITHUB_OUTPUT

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./builder
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}
            GH_CLI_VERSION=${{ env.GH_CLI_VERSION || '2.92.0' }}
            GITHUB_MCP_SERVER_VERSION=${{ env.GITHUB_MCP_SERVER_VERSION || '1.0.3' }}
            TERRAFORM_VERSION=${{ env.TERRAFORM_VERSION || '1.13.0' }}
            TERRAFORM_MCP_VERSION=${{ env.TERRAFORM_MCP_VERSION || '0.5.2' }}
            CODE_SERVER_VERSION=${{ env.CODE_SERVER_VERSION || '4.118.0' }}
            AWS_CLI_VERSION=${{ env.AWS_CLI_VERSION || '2.34.45' }}
            GCLOUD_VERSION=${{ env.GCLOUD_VERSION || '567.0.0' }}
            ALIYUN_CLI_VERSION=${{ env.ALIYUN_CLI_VERSION || '3.3.14' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  argocd-sync:
    name: ArgoCD Sync
    runs-on: ubuntu-latest
    needs: [check-llm-secrets, publish-secrets, build-and-push-image]
    steps:
      - name: ArgoCD login
        run: |
          argocd login ${{ vars.ARGOCD_SERVER }} --insecure --grpc-web \
            --username argocd-bot \
            --password '${{ secrets.ARGOCD_AUTH_TOKEN }}'

      - name: Sync hooks app (PreSync — TOOLS.md generation)
        run: |
          argocd app sync claw-code-local-hooks --force
          argocd app wait claw-code-local-hooks --timeout 300

      - name: Sync main app
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          argocd app set claw-code-local -p openclaw.image.repository="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          argocd app set claw-code-local -p openclaw.image.tag="${{ github.sha }}"
          argocd app sync claw-code-local --force
          argocd app wait claw-code-local --timeout 600

      - name: ArgoCD app status
        run: |
          echo "=== claw-code-local-hooks ==="
          argocd app get claw-code-local-hooks
          echo ""
          echo "=== claw-code-local ==="
          argocd app get claw-code-local