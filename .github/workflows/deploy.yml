name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ${{ vars.OPENCLAW_REGISTRY_URL }}
  IMAGE_NAME: openclaw/claw-code-local

jobs:
  check-llm-secrets:
    name: At least one LLM API key configured
    runs-on: arc-runner-scale-claw-code-local
    steps:
      - id: check
        run: |
          if [[ -n "$MISTRAL_API_KEY" ]] || [[ -n "$MINIMAX_API_KEY" ]]; then
            echo "At least one LLM API key is configured"
            exit 0
          else
            echo "ERROR: Neither MISTRAL_API_KEY nor MINIMAX_API_KEY is set."
            echo "This run will fail until at least one LLM API key is added to repository secrets."
            exit 1
          fi
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}

  publish-secrets:
    name: Publish Sealed Secrets
    runs-on: arc-runner-scale-claw-code-local
    needs: check-llm-secrets
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install kubectl and kubeseal
        run: |
          ARCH=$(dpkg --print-architecture)
          mkdir -p "$HOME/.local/bin"

          KUBECTL_VERSION="$(curl -sL https://dl.k8s.io/release/stable.txt)"
          curl -sLo "$HOME/.local/bin/kubectl" \
            "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/${ARCH}/kubectl"
          chmod +x "$HOME/.local/bin/kubectl"

          KUBESEAL_VERSION="0.27.3"
          curl -sLo /tmp/kubeseal.tar.gz \
            "https://github.com/bitnami-labs/sealed-secrets/releases/download/v${KUBESEAL_VERSION}/kubeseal-${KUBESEAL_VERSION}-linux-${ARCH}.tar.gz"
          tar -xzf /tmp/kubeseal.tar.gz -C "$HOME/.local/bin" kubeseal
          chmod +x "$HOME/.local/bin/kubeseal"

          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Write kubeconfig
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_DATA }}
        run: |
          echo "$KUBECONFIG_DATA" | base64 -d > /tmp/kubeconfig

      - name: Fetch SealedSecrets certificate
        run: |
          kubeseal --kubeconfig /tmp/kubeconfig --fetch-cert \
            --controller-namespace kube-system \
            --controller-name sealed-secrets \
            > /tmp/ss-cert.pem

      - name: Seal openclaw-secrets
        env:
          MISTRAL_API_KEY:        ${{ secrets.MISTRAL_API_KEY }}
          MINIMAX_API_KEY:        ${{ secrets.MINIMAX_API_KEY }}
          GITHUB_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          ENTRA_TENANT_ID:       ${{ secrets.ENTRA_TENANT_ID }}
          ENTRA_USERNAME:        ${{ secrets.ENTRA_USERNAME }}
          ENTRA_PASSWORD:        ${{ secrets.ENTRA_PASSWORD }}
          ENTRA_TOTP_SEED:      ${{ secrets.ENTRA_TOTP_SEED }}
          GITLAB_TOKEN:          ${{ secrets.GITLAB_TOKEN }}
          GITLAB_LOCAL_TOKEN:    ${{ secrets.GITLAB_LOCAL_TOKEN }}
          GITLAB_LOCAL_URL:      ${{ vars.GITLAB_LOCAL_URL }}
          OPENCLAW_REGISTRY_URL: ${{ vars.OPENCLAW_REGISTRY_URL }}
          PROXY_URL:             ${{ vars.PROXY_URL }}
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          ALIBABA_CLOUD_ACCESS_KEY_ID:     ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
          ALIBABA_CLOUD_REGION_ID:         ${{ vars.ALIBABA_CLOUD_REGION_ID }}
        run: |
          kubectl create secret generic openclaw-secrets \
            --namespace openclaw \
            --dry-run=client \
            --from-literal=MISTRAL_API_KEY="$MISTRAL_API_KEY" \
            --from-literal=MINIMAX_API_KEY="$MINIMAX_API_KEY" \
            --from-literal=GITHUB_TOKEN="$GITHUB_TOKEN" \
            --from-literal=ENTRA_TENANT_ID="$ENTRA_TENANT_ID" \
            --from-literal=ENTRA_USERNAME="$ENTRA_USERNAME" \
            --from-literal=ENTRA_PASSWORD="$ENTRA_PASSWORD" \
            --from-literal=ENTRA_TOTP_SEED="$ENTRA_TOTP_SEED" \
            --from-literal=GITLAB_TOKEN="$GITLAB_TOKEN" \
            --from-literal=GITLAB_LOCAL_TOKEN="$GITLAB_LOCAL_TOKEN" \
            --from-literal=GITLAB_LOCAL_URL="$GITLAB_LOCAL_URL" \
            --from-literal=OPENCLAW_REGISTRY_URL="$OPENCLAW_REGISTRY_URL" \
            --from-literal=PROXY_URL="$PROXY_URL" \
            --from-literal=OPENCLAW_UPSTREAM="kstrassheim/openclaw" \
            --from-literal=GOOGLE_APPLICATION_CREDENTIALS="/etc/openclaw/secrets/gcp-service-account.json" \
            --from-literal=AWS_ACCESS_KEY_ID="$AWS_ACCESS_KEY_ID" \
            --from-literal=AWS_SECRET_ACCESS_KEY="$AWS_SECRET_ACCESS_KEY" \
            --from-literal=ALIBABA_CLOUD_ACCESS_KEY_ID="$ALIBABA_CLOUD_ACCESS_KEY_ID" \
            --from-literal=ALIBABA_CLOUD_ACCESS_KEY_SECRET="$ALIBABA_CLOUD_ACCESS_KEY_SECRET" \
            --from-literal=ALIBABA_CLOUD_REGION_ID="$ALIBABA_CLOUD_REGION_ID" \
            -o yaml \
          | kubeseal --cert /tmp/ss-cert.pem --format yaml \
              > k8s/openclaw-secrets-sealed.yaml

      - name: Commit SealedSecrets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/openclaw-secrets-sealed.yaml
          git diff --cached --quiet || {
            git commit -m "chore: rotate sealed secrets"
            git pull --rebase origin main
            git push
          }

  build-and-push-image:
    name: Build and Push Image
    runs-on: arc-runner-scale-claw-code-local
    needs: [check-llm-secrets, publish-secrets]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to local registry
        # REGISTRY_USERNAME / REGISTRY_PASSWORD are injected into the
        # runner pod's env from the `registry-creds` Secret via envFrom
        # in shared/runner-values.yaml (k8s-deployment repo). They are
        # NOT GitHub repo secrets — the runner is already authorized to
        # push, no per-repo wiring needed.
        run: |
          test -n "${REGISTRY_USERNAME:-}" || { echo "::error::REGISTRY_USERNAME missing in runner env (registry-creds Secret)"; exit 1; }
          test -n "${REGISTRY_PASSWORD:-}" || { echo "::error::REGISTRY_PASSWORD missing in runner env (registry-creds Secret)"; exit 1; }
          echo "${REGISTRY_PASSWORD}" | docker login "${REGISTRY}" --username "${REGISTRY_USERNAME}" --password-stdin

      - name: Read VERSIONS file
        run: |
          . ./VERSIONS
          echo "OPENCLAW_UPSTREAM=${OPENCLAW_UPSTREAM}" >> "$GITHUB_ENV"

      - name: Require OPENCLAW_REGISTRY_URL
        # Fail fast with a clear message rather than letting an empty
        # ${REGISTRY} produce malformed image refs like
        # "/openclaw/claw-code-local/openclaw-base:tag" downstream.
        run: |
          if [ -z "${REGISTRY}" ]; then
            echo "::error::Repo variable OPENCLAW_REGISTRY_URL is not set. Configure it under Settings → Secrets and variables → Actions → Variables (e.g. mainpi.local:30500)."
            exit 1
          fi
          echo "Using registry: ${REGISTRY}"

      - name: Ensure openclaw-base is mirrored from GHCR into local registry
        # Mirrors claw-code's "Ensure openclaw-base is mirrored ..." step.
        # Upstream image lives at ghcr.io/openclaw/openclaw and is tagged
        # WITHOUT the v-prefix (2026.5.7), so we strip it on read. The local
        # registry retag keeps the v-prefix for human-readable parity.
        # Skip the pull when the target tag is already present, so re-runs
        # of the same SHA don't burn registry bandwidth.
        run: |
          SRC_TAG="${OPENCLAW_UPSTREAM#v}"
          SOURCE_IMAGE="ghcr.io/openclaw/openclaw:${SRC_TAG}"
          TARGET_IMAGE="${REGISTRY}/openclaw/openclaw-base:${OPENCLAW_UPSTREAM}"
          if docker manifest inspect "$TARGET_IMAGE" >/dev/null 2>&1; then
            echo "$TARGET_IMAGE already present — skipping import"
          else
            docker pull "$SOURCE_IMAGE"
            docker tag  "$SOURCE_IMAGE" "$TARGET_IMAGE"
            docker push "$TARGET_IMAGE"
          fi
          echo "BASE_IMAGE=${TARGET_IMAGE}" >> "$GITHUB_ENV"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./builder
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}
            GH_CLI_VERSION=2.92.0
            GITHUB_MCP_SERVER_VERSION=1.0.3
            TERRAFORM_VERSION=1.13.0
            TERRAFORM_MCP_VERSION=0.5.2
            CODE_SERVER_VERSION=4.118.0
            AWS_CLI_VERSION=2.34.45
            GCLOUD_VERSION=567.0.0
            ALIYUN_CLI_VERSION=3.3.14
          cache-from: type=gha
          cache-to: type=gha,mode=max

  argocd-sync:
    name: ArgoCD Sync
    runs-on: arc-runner-scale-claw-code-local
    needs: [check-llm-secrets, publish-secrets, build-and-push-image]
    steps:
      - name: ArgoCD login
        run: |
          argocd login "${{ vars.ARGOCD_SERVER }}" --insecure --grpc-web \
            --username argocd-bot \
            --password '${{ secrets.ARGOCD_AUTH_TOKEN }}'

      - name: Sync hooks app (PreSync — TOOLS.md generation)
        run: |
          argocd app sync claw-code-local-hooks --force
          argocd app wait claw-code-local-hooks --timeout 300

      - name: Sync main app
        run: |
          argocd app set claw-code-local -p openclaw.image.repository="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          argocd app set claw-code-local -p openclaw.image.tag="${{ github.sha }}"
          argocd app sync claw-code-local --force
          argocd app wait claw-code-local --timeout 600

      - name: ArgoCD app status
        run: |
          echo "=== claw-code-local-hooks ==="
          argocd app get claw-code-local-hooks
          echo ""
          echo "=== claw-code-local ==="
          argocd app get claw-code-local