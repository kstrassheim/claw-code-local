---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: claw-code-local-manifests
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: claw-code-local
  source:
    repoURL: https://github.com/kstrassheim/claw-code-local.git
    targetRevision: feature/issue-1
    path: k8s
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: openclaw
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
